name: CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: entityflow
          POSTGRES_USER: entityflow
          POSTGRES_PASSWORD: entityflow
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U entityflow -d entityflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt
      - name: Initialize database schema
        env:
          PGPASSWORD: entityflow
        run: psql -h localhost -p 5434 -U entityflow -d entityflow -f app/db/schema.sql
      - name: Run backend tests
        env:
          DATABASE_URL: postgresql+psycopg2://entityflow:entityflow@localhost:5434/entityflow
        run: python -m pytest

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json
      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend
      - name: Build frontend
        run: npm run build
        working-directory: frontend
